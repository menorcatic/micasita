<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Casita - Estado Solar</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .dashboard { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 30px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; width: 220px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .value { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .time { font-size: 0.8rem; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Monitoreo 2.0 de Mi Casita</h1>
    
    <div class="dashboard">
        <div class="card">
            <h3>Potencia Solar</h3>
            <!-- Color naranja para la energía solar -->
            <div id="potencia" class="value" style="color: #f39c12;">-- W</div>
        </div>
        
        <div class="card">
            <h3>Voltaje Batería</h3>
            <!-- Este valor cambiará de color según el voltaje -->
            <div id="voltaje" class="value">-- V</div>
        </div>
    </div>

    <div class="time">Última actualización: <span id="hora">--:--:--</span></div>

    <script>
        // Función corregida para leer las variables del JSON actual
async function actualizarDatos() {
    try {
        // Esta línea destruye la caché y descarga los datos reales de GitHub
        const respuesta = await fetch('datos.json', { cache: "no-store" });
        const datos = await respuesta.json();
        
        // Pinta los vatios y voltios en las tarjetas oscuras
        document.getElementById('potencia').innerText = datos.potencia_solar + " W";
        document.getElementById('voltaje').innerText = datos.voltaje_bateria + " V";
        document.getElementById('hora').innerText = datos.actualizado;
        
    } catch (error) {
        console.log("Esperando datos...", error);
    }
}

        // Ejecutar inmediatamente al abrir y repetir estrictamente cada 15 segundos
        actualizarDatos();
        setInterval(actualizarDatos, 60000);
    </script>

</body>
</html>
