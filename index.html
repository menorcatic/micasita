<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Casita - Monitoreo Compacto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .contenido-principal {
            flex: 1;
            padding-right: 10px;
        }

        /* Columna derecha reducida a la mitad de anchura (de 220px a 110px) */
        .columna-derecha {
            width: 110px; 
            display: flex;
            flex-direction: column;
            gap: 5px; /* Espacio entre cajitas reducido a la mitad */
        }

        /* Cajitas reducidas a la mitad de altura y grosor */
        .caja-sensor {
            border: 1px solid #ffffff; /* Borde más fino */
            border-radius: 6px; /* Curvatura más sutil */
            padding: 4px; /* Menos espacio interno */
            text-align: center;
            font-size: 11px; /* Letra más pequeña */
            font-weight: bold;
            color: #ffffff;
            background-color: transparent;
            transition: background-color 0.3s ease;
        }

        /* Título mini dentro de la caja */
        .caja-sensor span {
            display: block;
            font-size: 8px; /* Texto ultra compacto */
            color: #aaaaaa;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="contenido-principal">
        <h1>Monitoreo General de Mi Casita</h1>
        <p>Lectura: <span id="hora-lectura">--:--:--</span></p>
    </div>

    <!-- Columna ultra compacta pegada a la derecha -->
    <div class="columna-derecha" id="panel-sensores">
        <!-- Las cajas se generan aquí automáticamente -->
    </div>

    <script>
        window.datosSensores = {};

        function obtenerColorRelleno(idSensor, valor) {
            const num = parseFloat(valor);
            if (isNaN(num)) return 'transparent';
            // (Aquí irán tus lógicas de colores en el futuro)
            return 'transparent';
        }

        function renderizarColumnaDerecha() {
            const panel = document.getElementById('panel-sensores');
            panel.innerHTML = '';

            // Lista con las claves exactas de tu JSON
            const listaOrdenada = [
                { id: 'PotPlaca_Est', etiqueta: 'Placa Est.' },
                { id: 'PotPlacas', etiqueta: 'Placas Real' },
                { id: 'PotCons', etiqueta: 'Consumo' },
                { id: 'VBat', etiqueta: 'V. Batería' },
                { id: 'TSSR', etiqueta: 'T. SSR' },
                { id: 'TM', etiqueta: 'T. Amb (TM)' },
                { id: 'TS', etiqueta: 'T. TS' },
                { id: 'TR', etiqueta: 'T. TR' },
                { id: 'TSR1', etiqueta: 'T. TSR1' },
                { id: 'TSR2', etiqueta: 'T. TSR2' },
                { id: 'TDepCa', etiqueta: 'T. Dep. Ca.' },
                { id: 'TDepFr', etiqueta: 'T. Dep. Fr.' },
                { id: 'TTub', etiqueta: 'T. Tubos' },
                { id: 'TBat', size: 'T. Bat.' },
                { id: 'NDepCa', etiqueta: 'N. Dep. Ca.' },
                { id: 'NDepAl', etiqueta: 'N. Dep. Al.' },
                { id: 'nDepfr', etiqueta: 'N. Dep. Fr.' },
                { id: 'Ret', etiqueta: 'Flujo Ret.' },
                { id: 'Den', etiqueta: 'Densidad' }
            ];

            listaOrdenada.forEach(sensor => {
                // Comprobamos si el dato existe en el objeto global
                let valorActual = '--';
                if (window.datosSensores && window.datosSensores[sensor.id] !== undefined) {
                    valorActual = window.datosSensores[sensor.id];
                }

                const colorFondo = obtenerColorRelleno(sensor.id, valorActual);

                const caja = document.createElement('div');
                caja.className = 'caja-sensor';
                caja.style.backgroundColor = colorFondo;
                caja.innerHTML = `<span>${sensor.etiqueta}</span> ${valorActual}`;
                
                panel.appendChild(caja);
            });
        }

        async function consultarServidor() {
            try {
                const respuesta = await fetch('./sensores.json?v=' + new Date().getTime());
                const datos = await respuesta.json();

                // Guardamos los datos directamente
                window.datosSensores = datos;
                renderizarColumnaDerecha();

                document.getElementById('hora-lectura').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Error al sincronizar datos:", error);
                // Si falla la lectura, pintamos la columna con '--' igualmente
                renderizarColumnaDerecha();
            }
        }

        consultarServidor();
        setInterval(consultarServidor, 20000);
    </script>
</body>
</html>
