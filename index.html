<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Casita - Monitoreo Compacto</title>
    <style>
        body {
             font-family: Arial, sans-serif;
             background-color: #070166;
            
            /* Tu malla de guiones */
             background-image: 
                  linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px), 
                  linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px),
                  linear-gradient(#070166 5px, transparent 5px), 
                  linear-gradient(90deg, #070166 5px, transparent 5px);
              background-size: 12px 12px, 12px 12px, 8px 8px, 8px 8px;
            
              color: #ffffff;
              margin: 0;
              padding: 25px; /* Aumentado para que el contenido no toque el marco */
              display: flex;
              justify-content: space-between;
              min-height: 100vh;
              box-sizing: border-box;
              position: relative; /* Necesario para posicionar el marco */
          }
        /* MARCO CON CHAFLÁN DIRECTO DE 3PX DE GROSOR */
        body::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            pointer-events: none;
            
            /* Color del marco */
            background-color: rgba(255, 255, 255, 0.4); 
            
            /* Dibuja el borde exterior y resta 3px exactos hacia el interior */
            clip-path: polygon(
                /* 1. Borde Exterior con Chaflanes de 10px */
                10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px,
                /* Cierre y salto al interior */
                10px 0, 
                /* 2. Borde Interior (ajustado para mantener 3px de grosor en todo el recorrido) */
                11.24px 3px, 3px 11.24px, 3px calc(100% - 11.24px), 11.24px calc(100% - 3px), calc(100% - 11.24px) calc(100% - 3px), calc(100% - 3px) calc(100% - 11.24px), calc(100% - 3px) 11.24px, calc(100% - 11.24px) 3px
            );
        }
        .contenido-principal {
            flex: 1;
            padding-right: 10px;
        }

        /* Columna derecha reducida a la mitad de anchura (de 220px a 110px) */
        .columna-derecha {
            width: 110px; 
            display: flex;
            flex-direction: column;
            gap: 5px; /* Espacio entre cajitas reducido a la mitad */
        }

        /* Cajitas reducidas a la mitad de altura y grosor */
        .caja-sensor {
            border: 1px solid #ffffff; /* Borde más fino */
            border-radius: 6px; /* Curvatura más sutil */
            padding: 4px; /* Menos espacio interno */
            text-align: center;
            font-size: 11px; /* Letra más pequeña */
            font-weight: bold;
            color: #ffffff;
            background-color: transparent;
            transition: background-color 0.3s ease;
        }

        /* Título mini dentro de la caja */
        .caja-sensor span {
            display: block;
            font-size: 8px; /* Texto ultra compacto */
            color: #aaaaaa;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        /* CAJA CONTENEDORA ABAJO A LA IZQUIERDA */
        .caja-pestana {
            position: fixed; /* Lo fija en la pantalla */
            left: 25px;      /* Separación del lado izquierdo */
            bottom: 25px;    /* Separación del fondo */
            width: 200px;
            /* El alto total pasa a ser 115px (100px de caja + 15px de pestaña) */
            height: 115px; 
            color: #ffffff;
            padding: 20px 10px 10px 10px; /* Más espacio arriba para no pisar la pestaña */
            box-sizing: border-box;
            font-size: 12px;
        }

        /* EL MARCO CON PESTAÑA Y CHAFLANES REFORZADO A 3PX */
        .caja-pestana::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            background-color: rgba(255, 255, 255, 0.4); /* Mismo color del marco principal */
            
            /* Dibuja la silueta exterior con la pestaña arriba a la izquierda y luego el hueco de 3px */
            clip-path: polygon(
                /* --- 1. SILUETA EXTERIOR --- */
                /* Pestaña superior (Inicia en x:0 y sube en x:15px hasta x:70px) */
                0 15px, 15px 0, 70px 0, 85px 15px, 
                /* Esquina superior derecha (Chaflán a 10px) */
                190px 15px, 200px 25px, 
                /* Esquina inferior derecha (Chaflán a 10px) */
                200px 105px, 190px 115px, 
                /* Esquina inferior izquierda (Chaflán a 10px) */
                10px 115px, 0 105px, 
                
                /* CIERRE Y SALTO AL INTERIOR */
                0 15px, 
                
                /* --- 2. SILUETA INTERIOR (Grosor de 3px) --- */
                3px 16.24px, 11.24px 112px, 188.76px 112px, 197px 103.76px, 197px 26.24px, 188.76px 18px, 83.76px 18px, 68.76px 3px, 16.24px 3px, 3px 16.24px
            );
        }
    </style>
</head>
<body>
    <!-- Caja con pestaña de archivo abajo a la izquierda -->
    <div class="caja-pestana"></div>

    <div class="contenido-principal">
        <h1>Monitoreo General de Mi Casita con Colores</h1>
        <p>Lectura: <span id="hora-lectura">--:--:--</span></p>
    </div>

    <!-- Columna ultra compacta pegada a la derecha -->
    <div class="columna-derecha" id="panel-sensores">
        <!-- Las cajas se generan aquí automáticamente -->
    </div>

    <script>
        window.datosSensores = {};

        function obtenerColorRelleno(idSensor, valor) {
            const num = parseFloat(valor);
            if (isNaN(num)) return 'transparent';
            
            if (idSensor === 'PotPlacas') {
                if (num === 0) return 'transparent';      // De noche, solo reborde
                if (num < 400) return 'rgb(255, 0, 0)';       // Producción baja, fondo rojo
                if (num < 1000) return 'rgb(255, 165, 0)';       // Producción media, fondo naranja
                if (num < 2000) return 'rgb(255, 255, 0)';       // Producción buena, fondo amarillo
                return 'rgb(0, 255, 0)';                        // Producción alta, fondo verde
            }

            if (idSensor === 'PotCons') {
                if (num === 0) return 'transparent';      // De noche, solo reborde
                if (num < 300) return 'rgb(0, 255, 0)';       // Producción baja, fondo verde
                if (num < 500) return 'rgb(255, 255, 0)';       // Producción media, fondo amarillo
                if (num < 800) return 'rgb(255, 165, 0)';       // Producción alta, fondo naranja
                return 'rgb(255, 0, 0)';                        // Producción muy alta, fondo rojo
            }
            
            if (idSensor === 'VBat') {
                if (num === 0) return 'transparent';      // De noche, solo reborde
                if (num < 24) return 'rgb(255, 0, 0)';       // Producción baja, fondo rojo
                if (num < 25) return 'rgb(255, 165, 0)';       // Producción media, fondo naranja
                if (num < 26) return 'rgb(255, 255, 0)';       // Producción buena, fondo amarillo
                return 'rgb(0, 255, 0)';                        // Producción alta, fondo verde
            }
            
            return 'transparent';
        }

function renderizarColumnaDerecha() {
    const panel = document.getElementById('panel-sensores');
    panel.innerHTML = '';

    // Añadimos el "grupo" exacto donde está guardado cada sensor en el JSON
    const listaOrdenada = [
        { id: 'PotPlaca_Est', grupo: 'potencia', etiqueta: 'Placa Est.' },
        { id: 'PotPlacas', grupo: 'potencia', etiqueta: 'Placas Real' },
        { id: 'PotCons', grupo: 'potencia', etiqueta: 'Consumo' },
        { id: 'VBat', grupo: 'potencia', etiqueta: 'V. Batería' },
        { id: 'TSSR', grupo: 'temperatura', etiqueta: 'T. SSR' },
        { id: 'TM', grupo: 'temperatura', etiqueta: 'T. Amb (TM)' },
        { id: 'TS', grupo: 'temperatura', etiqueta: 'T. TS' },
        { id: 'TR', grupo: 'temperatura', etiqueta: 'T. TR' },
        { id: 'TSR1', grupo: 'temperatura', etiqueta: 'T. TSR1' },
        { id: 'TSR2', grupo: 'temperatura', etiqueta: 'T. TSR2' },
        { id: 'TDepCa', grupo: 'temperatura', etiqueta: 'T. Dep. Ca.' },
        { id: 'TDepFr', grupo: 'temperatura', etiqueta: 'T. Dep. Fr.' },
        { id: 'TTub', grupo: 'temperatura', etiqueta: 'T. Tubos' },
        { id: 'TBat', grupo: 'temperatura', etiqueta: 'T. Bat.' },
        { id: 'NDepCa', grupo: 'nivel', etiqueta: 'N. Dep. Ca.' },
        { id: 'NDepAl', grupo: 'nivel', etiqueta: 'N. Dep. Al.' },
        { id: 'nDepfr', grupo: 'nivel', etiqueta: 'N. Dep. Fr.' },
        { id: 'Ret', grupo: 'flujo', etiqueta: 'Flujo Ret.' },
        { id: 'Den', grupo: 'densidad', etiqueta: 'Densidad' }
    ];

    listaOrdenada.forEach(sensor => {
        let valorActual = '--';
        
        // Accedemos primero al grupo y luego al sensor (Ej: datos.potencia.PotPlacas)
        if (window.datosSensores && window.datosSensores[sensor.grupo] && window.datosSensores[sensor.grupo][sensor.id] !== undefined) {
            valorActual = window.datosSensores[sensor.grupo][sensor.id];
        }
        if (valorActual === 'unknown' || valorActual === 'unavailable') {
        valorActual = '--';}

        const colorFondo = obtenerColorRelleno(sensor.id, valorActual);

        const caja = document.createElement('div');
        caja.className = 'caja-sensor';
        caja.style.backgroundColor = colorFondo;
        caja.innerHTML = `<span>${sensor.etiqueta}</span> ${valorActual}`;
        
        panel.appendChild(caja);
    });
}

        async function consultarServidor() {
            try {
                const respuesta = await fetch('./sensores.json?v=' + new Date().getTime());
                const datos = await respuesta.json();

                // Guardamos los datos directamente
                window.datosSensores = datos;
                renderizarColumnaDerecha();

                document.getElementById('hora-lectura').innerText = new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Error al sincronizar datos:", error);
                // Si falla la lectura, pintamos la columna con '--' igualmente
                renderizarColumnaDerecha();
            }
        }

        consultarServidor();
        setInterval(consultarServidor, 20000);
    </script>  
</body>
</html>
