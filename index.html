<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Casita - Monitoreo Compacto</title>
    <link rel="stylesheet" href="estilos.css"> 
</head>
<body>
    
    <!-- MÓDULO CONSOLA DE TEMAS CON MARCO AVANZADO -->
    <div class="contenedor-modulo-temas">
        <!-- El fondo decorativo militar con solapas y paralelogramos -->
        <div class="marco-modulo-decorativo"></div>
        <!-- Tus 4 botones trapecio existentes -->
        <div class="panel-control-temas">
            <button class="btn-trapecio btn-invertir" onclick="invertirColores()">🔄 INV</button>
            <button class="btn-trapecio btn-r" onclick="cambiarTema('rojo')">R</button>
            <button class="btn-trapecio btn-g" onclick="cambiarTema('verde')">G</button>
            <button class="btn-trapecio btn-b" onclick="cambiarTema('azul')">B</button>
        </div>
    </div>
    
    <!-- CONTENEDOR MAESTRO PARA EL PANEL SOLAR (Arriba a la izquierda) -->
    <div id="panel-solar"></div>
    
    <!-- AQUÍ SE GENERARÁN TODOS LOS DEPÓSITOS DE FORMA AUTOMÁTICA -->
    <div id="panel-depositos"></div>

    <!-- EL NUEVO CONDUCTO DINÁMICO EN FORMA DE T -->
    <div id="conducto-solar-ac"></div>

    <!-- CONTENEDOR PARA LA ÚLTIMA LECTURA (Llevado abajo a la derecha) -->
    <div id="contenedor-lectura">Lectura: 
        <span id="hora-lectura">--:--:--</span>
    </div>

    <!-- Columna ultra compacta pegada a la derecha -->
    <div class="columna-derecha" id="panel-sensores"></div>

    <!-- LLAMADAS EN ORDEN A TU PROGRAMACIÓN INDEPENDIENTE -->
    <script src="select_tema.js"></script>
    <script src="colores.js"></script>
    <script src="render.js"></script>
    <script src="servidor.js"></script>
    
</body>
</html>
